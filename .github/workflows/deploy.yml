name: DP Deploy AWS Clients
on:
  workflow_dispatch:
env:
  BRANCH_NAME: version-bump-${{ github.run_id }}${{ github.run_attempt }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          git_user_signingkey: true
          git_commit_gpgsign: true
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - run: |
          git config --global user.email 181243999+tna-da-bot@users.noreply.github.com
          git config --global user.name tna-da-bot
          git checkout -b $BRANCH_NAME
          git push -u origin $BRANCH_NAME
          sbt '+release with-defaults'
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      - name: Create Pull Request
        run: gh pr create --fill --label 'Version bump'
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
      - if: failure()
        run: python .github/scripts/send_message.py
        env:
          MESSAGE: ":warning: Build failed for DA AWS clients <https://github.com/nationalarchives/da-aws-clients/actions/runs/${{ github.run_id }}|View the failed workflow>"
      - run: python .github/scripts/send_message.py
        env:
          MESSAGE: ":white_check_mark: da-aws-clients has been published"
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: sbt/setup-sbt@ae54f7cfe46ec0d24ade661d77f007360ab48bda # v6.0.2
      - name: Update docs site
        run: |
          sbt 'docs / makeSite'
          git config --global user.email 181243999+tna-da-bot@users.noreply.github.com
          git config --global user.name tna-da-bot
          git checkout gh-pages
          rm -rf docs
          mkdir docs && cp -r site-docs/target/site/* docs
          git add docs
          git commit -m "Update site documentation"
          git push -u origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
